name: Contracts CI

on:
  pull_request:
    paths:
      - "contracts/**"
  push:
    branches: [main]
    paths:
      - "contracts/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build
        run: forge build --sizes

      - name: Enforce bytecode size budget
        run: |
          SIZE=$(forge build --sizes --json | jq -r '.SyndicateGovernor.runtime_size // empty')
          echo "SyndicateGovernor runtime size: $SIZE bytes"
          if [ -z "$SIZE" ]; then
            echo "::error::could not read SyndicateGovernor runtime size"
            exit 1
          fi
          if [ "$SIZE" -gt 24550 ]; then
            echo "::error::SyndicateGovernor $SIZE > 24550 byte budget"
            exit 1
          fi

      - name: Unit tests
        run: forge test -vvv --no-match-path "test/integration/*"

      - name: Fork integration tests
        if: env.BASE_RPC_URL != ''
        run: forge test -vvv --fork-url base --match-path "test/integration/*" --no-match-contract "SimulateExecution|PortfolioIntegration"
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}

      - name: Format check
        run: forge fmt --check
