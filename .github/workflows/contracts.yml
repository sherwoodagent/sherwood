name: Contracts CI

on:
  pull_request:
    paths:
      - "contracts/**"
  push:
    branches: [main]
    paths:
      - "contracts/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build
        run: forge build --sizes

      - name: Enforce bytecode size budget
        run: |
          SIZES_JSON=$(forge build --sizes --json)

          GOV_SIZE=$(echo "$SIZES_JSON" | jq -r '.SyndicateGovernor.runtime_size // empty')
          echo "SyndicateGovernor runtime size: $GOV_SIZE bytes"
          if [ -z "$GOV_SIZE" ]; then
            echo "::error::could not read SyndicateGovernor runtime size"
            exit 1
          fi
          if [ "$GOV_SIZE" -gt 24550 ]; then
            echo "::error::SyndicateGovernor $GOV_SIZE > 24550 byte budget"
            exit 1
          fi

          # I-3 (V1.5): registry bytecode gate. Registry approached EIP-170
          # (24,576) during V1.5 claim-path additions — gate at 24,550 matches
          # the governor's pattern and provides a 26-byte headroom alarm.
          REG_SIZE=$(echo "$SIZES_JSON" | jq -r '.GuardianRegistry.runtime_size // empty')
          echo "GuardianRegistry runtime size: $REG_SIZE bytes"
          if [ -z "$REG_SIZE" ]; then
            echo "::error::could not read GuardianRegistry runtime size"
            exit 1
          fi
          if [ "$REG_SIZE" -gt 24550 ]; then
            echo "::error::GuardianRegistry $REG_SIZE > 24550 byte budget"
            exit 1
          fi

          # Vault: currently ~11k bytes. 22,000 byte gate gives us ~10kb of
          # headroom but catches a runaway addition before it tips EIP-170.
          VAULT_SIZE=$(echo "$SIZES_JSON" | jq -r '.SyndicateVault.runtime_size // empty')
          echo "SyndicateVault runtime size: $VAULT_SIZE bytes"
          if [ -z "$VAULT_SIZE" ]; then
            echo "::error::could not read SyndicateVault runtime size"
            exit 1
          fi
          if [ "$VAULT_SIZE" -gt 22000 ]; then
            echo "::error::SyndicateVault $VAULT_SIZE > 22000 byte budget"
            exit 1
          fi

          # Factory: currently ~11k bytes. Same headroom rationale.
          FACTORY_SIZE=$(echo "$SIZES_JSON" | jq -r '.SyndicateFactory.runtime_size // empty')
          echo "SyndicateFactory runtime size: $FACTORY_SIZE bytes"
          if [ -z "$FACTORY_SIZE" ]; then
            echo "::error::could not read SyndicateFactory runtime size"
            exit 1
          fi
          if [ "$FACTORY_SIZE" -gt 22000 ]; then
            echo "::error::SyndicateFactory $FACTORY_SIZE > 22000 byte budget"
            exit 1
          fi

      - name: Unit tests
        run: forge test -vvv --no-match-path "test/integration/*"

      - name: Fork integration tests
        if: env.BASE_RPC_URL != ''
        # Skipped suites:
        #   - SimulateExecution, PortfolioIntegration: require specific live-state configs.
        #   - GovernanceIntegrationTest, AerodromeLPIntegrationTest, MoonwellSupplyIntegrationTest,
        #     WstETHMoonwellIntegrationTest: assert post-PR-229 ProposalState enum indices
        #     (Settled=7, Rejected=4) but run against the mainnet governor proxy that still
        #     serves the pre-PR-229 impl (Settled=6, Rejected=3 — no GuardianReview slot).
        #     Re-enable after V1.5 governor + GuardianRegistry are deployed on Base.
        run: forge test -vvv --fork-url base --match-path "test/integration/*" --no-match-contract "SimulateExecution|PortfolioIntegration|GovernanceIntegrationTest|AerodromeLPIntegrationTest|MoonwellSupplyIntegrationTest|WstETHMoonwellIntegrationTest"
        env:
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}

      - name: Format check
        run: forge fmt --check
