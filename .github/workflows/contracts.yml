name: Contracts CI

on:
  pull_request:
    paths:
      - "contracts/**"
  push:
    branches: [main]
    paths:
      - "contracts/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vvv

      - name: Format check
        run: forge fmt --check
