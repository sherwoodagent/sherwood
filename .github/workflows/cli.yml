name: CLI CI

on:
  pull_request:
    paths:
      - "cli/**"
  push:
    branches: [main]
    paths:
      - "cli/**"

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: npm install

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: npm install

      - name: Unit Tests
        run: npm run test:unit

  integration-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    defaults:
      run:
        working-directory: cli
    env:
      ENABLE_TESTNET: "true"
      BASE_SEPOLIA_RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
      VAULT_ADDRESS_TESTNET: ${{ secrets.VAULT_ADDRESS_TESTNET }}
      FACTORY_ADDRESS_TESTNET: ${{ secrets.FACTORY_ADDRESS_TESTNET }}
      REGISTRY_ADDRESS_TESTNET: ${{ secrets.REGISTRY_ADDRESS_TESTNET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: npm install

      - name: Integration Tests
        run: npm run test:integration

  contracts-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vvv

  # ── Publish (main only, gates on ALL checks passing) ────────────
  release:
    needs: [typecheck, unit-tests, integration-tests, contracts-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
      npm_published: ${{ steps.check_npm.outputs.published }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        run: echo "version=v$(jq -r .version cli/package.json)" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if version already published to npm
        id: check_npm
        run: |
          PKG_VERSION=$(jq -r .version cli/package.json)
          NPM_VERSION=$(npm view @sherwoodagent/cli version 2>/dev/null || echo "")
          if [ "$PKG_VERSION" = "$NPM_VERSION" ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Version $PKG_VERSION already published to npm — skipping"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true

  # Primary distribution — npm handles native bindings (XMTP) correctly
  publish-npm:
    needs: release
    if: needs.release.outputs.tag_exists == 'false' && needs.release.outputs.npm_published == 'false'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm install

      - name: Build
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: npm run build

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Secondary distribution — standalone binary (no XMTP chat support)
  build-binaries:
    needs: release
    if: needs.release.outputs.tag_exists == 'false'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: darwin-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install
        run: bun install

      - name: Compile standalone binary
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: bun build src/index.ts --compile --outfile sherwood-${{ matrix.target }}

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.version }}
          files: cli/sherwood-${{ matrix.target }}
